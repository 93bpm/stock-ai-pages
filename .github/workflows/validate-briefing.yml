name: Validate briefing

# v1.6.0 Sub-Feature A — briefing JSON 품질 검증 CI (이중 안전망).
# routine이 Sanity Check를 빼먹어도 CI가 schema/sourceUrl/카운트/calendarWeek 일관성/페르소나를
# 자동 검증. 검증 로직은 scripts/validate-briefing.mjs.
#
# ★ 게이트 모드 (기본, v1.6.1~): HARD 위반 시 CI 빨간 X (VALIDATE_STRICT=1).
#   데이터 품질 안정(5/28~6/9 HARD 0건)으로 리포트→게이트 승격.
#   리포트 모드로 되돌리려면 workflow_dispatch에서 strict=false 입력.
# ★ auto-merge-routine.yml 과 독립 — 이 CI가 빨개도 머지는 진행됨 (페이지 빈 화면 방지).

on:
  push:
    branches:
      - 'claude/**'
      - 'main'
    paths:
      - 'briefing/**.json'
  workflow_dispatch:
    inputs:
      date:
        description: '검증할 날짜 YYYY-MM-DD (비우면 변경 파일 또는 latest)'
        required: false
      strict:
        description: 'STRICT 게이트 (기본 on — false 입력 시에만 리포트 모드)'
        required: false
        default: 'true'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # git diff HEAD~1 용

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv
        run: npm install --no-save ajv@8 ajv-formats@2

      - name: Validate briefing(s)
        env:
          VALIDATE_STRICT: ${{ github.event.inputs.strict == 'false' && '' || '1' }}
        run: |
          # 1) 수동 입력 날짜 우선
          if [ -n "${{ github.event.inputs.date }}" ]; then
            node scripts/validate-briefing.mjs "${{ github.event.inputs.date }}"
            exit $?
          fi
          # 2) 이번 push 에서 변경된 briefing 파일 추출
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -oE 'briefing/[0-9]{4}-[0-9]{2}-[0-9]{2}\.json' | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' || true)
          if [ -z "$CHANGED" ]; then
            echo "변경된 briefing 없음 → manifest.latest 검증"
            node scripts/validate-briefing.mjs
          else
            FAIL=0
            for d in $CHANGED; do
              echo "────── 검증: $d ──────"
              node scripts/validate-briefing.mjs "$d" || FAIL=1
            done
            exit $FAIL
          fi
